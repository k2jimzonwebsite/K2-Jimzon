name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (catches import/syntax breaks)
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      # Runs against `npm run dev` (see playwright.config webServer) with no
      # Supabase env, so the storefront uses local mock data — no secrets needed,
      # no live database writes.
      - name: Smoke tests (buy flow)
        run: npx playwright test tests/smoke.spec.js
        env:
          CI: 'true'

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
